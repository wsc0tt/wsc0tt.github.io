name: Deploy to GitHub Pages

on:
  push:
    branches: [ 'main' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          VITE_EJS_PUBLIC_KEY: ${{ vars.VITE_EJS_PUBLIC_KEY }}
          VITE_EJS_TEMPLATE_ID: ${{ vars.VITE_EJS_TEMPLATE_ID }}
          VITE_EJS_SERVICE_ID: ${{ vars.VITE_EJS_SERVICE_ID }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # The folder containing your built site
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
